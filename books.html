<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="books.css" />
    <title>Cozy Café</title>
  </head>
  <body>
    <header>
      <h1
        style="
          font-family:
            &quot;Trebuchet MS&quot;, &quot;Lucida Sans Unicode&quot;,
            &quot;Lucida Grande&quot;, &quot;Lucida Sans&quot;, Arial,
            sans-serif;
        "
      >
        Cozy Café
      </h1>
      <p>Your daily dose of happiness</p>
    </header>
    <section>
      <h2>Books available</h2>
      <div class="books">
        <div class="book">
          <img
            src="https://bookabook.pk/cdn/shop/files/1704631277.png?v=1704631295&width=1445"
            alt="dps"
            class="bookimg"
          />
          <p class="names">Dead Poets Society</p>
        </div>
        <div class="book">
          <img
            src="https://thebookshopccs.com/cdn/shop/files/DAILYLAWS_18.png?v=1711077016&width=2048"
            alt="all"
            class="bookimg"
          />
          <p class="names">A Little Life</p>
        </div>
        <div class="book">
          <img src="images/b1.png" alt="wn" class="bookimg" />
          <p class="names">White Nights</p>
        </div>
        <div class="book">
          <img src="images/b2.png" alt="np" class="bookimg" />
          <p class="names">Normal People</p>
        </div>
        <div class="book">
          <img
            src="https://shoppersstore.net/wp-content/uploads/2025/12/no-longer-human-book.png"
            alt="nlh"
            class="bookimg"
          />
          <p class="names">No Longer Human</p>
        </div>
        <div class="book">
          <img src="images/b3.png" alt="tm" class="bookimg" />
          <p class="names">The Metamorphosis</p>
        </div>
      </div>
    </section>
  </body>
</html>
