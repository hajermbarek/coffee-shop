<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="seatingbooks.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:...&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Cozy Café</title>
  </head>
  <body>
    <header>
      <h1
        style="
          font-family:
            &quot;Trebuchet MS&quot;, &quot;Lucida Sans Unicode&quot;,
            &quot;Lucida Grande&quot;, &quot;Lucida Sans&quot;, Arial,
            sans-serif;
        "
      >
        Reservation
      </h1>
      <p class="title">
        pick a table on the floor plan then choose the time and date
      </p>
    </header>
    <section>
      <div class="arrange">
        <p>Book a Table</p>
        <div class="table-surf">
          <button class="table-top">
            <span class="dot top"></span>
            <span class="dot right"></span>
            <span class="dot bottom"></span>
            <span class="dot left"></span>
            <span class="number">1</span>
            <span class="seats">4 seats</span>
          </button>
          <button class="table-top">
            <span class="dot right"></span>
            <span class="dot left"></span>
            <span class="number">2</span>
            <span class="seats">2 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="dot right"></span>
            <span class="dot bottom"></span>
            <span class="dot left"></span>
            <span class="number">3</span>
            <span class="seats">4 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="number">4</span>
            <span class="seats">1 seat</span>
          </button>
          <button class="table-top">
            <span class="dot right"></span>
            <span class="dot left"></span>
            <span class="number">5</span>
            <span class="seats">2 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="number">6</span>
            <span class="seats">1 seat</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="dot right"></span>
            <span class="dot bottom"></span>
            <span class="dot left"></span>
            <span class="number">7</span>
            <span class="seats">4 seats</span>
          </button>
          <button class="table-top">
            <span class="dot right"></span>
            <span class="dot left"></span>
            <span class="number">8</span>
            <span class="seats">2 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="dot right"></span>
            <span class="dot left"></span>
            <span class="number">9</span>
            <span class="seats">3 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="dot right"></span>
            <span class="dot bottom"></span>
            <span class="dot left"></span>
            <span class="number">10</span>
            <span class="seats">4 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="number">11</span>
            <span class="seats">1 seat</span>
          </button>
          <button class="table-top">
            <span class="dot right"></span>
            <span class="dot left"></span>
            <span class="number">12</span>
            <span class="seats">2 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="dot right"></span>
            <span class="dot left"></span>
            <span class="number">13</span>
            <span class="seats">3 seats</span>
          </button>
          <button class="table-top">
            <span class="dot right"></span>
            <span class="dot left"></span>
            <span class="number">14</span>
            <span class="seats">2 seats</span>
          </button>
          <button class="table-top">
            <span class="dot top"></span>
            <span class="number">15</span>
            <span class="seats">1 seat</span>
          </button>
        </div>
      </div>
      <div class="select">
        <div class="booking">
          <label class="booking-label">Selected table :</label>
          <div class="selected-box">
            <p id="slcttable"></p>
          </div>
        </div>
        <div class="date">
          <label for="date">Pick a day :</label>
          <input type="date" id="date" name="date" />
        </div>
        <div class="time">
          <label for="timeSelect">Pick a time :</label>
          <select id="timeSelect" size="5">
            <option>09:00</option>
            <option>09:30</option>
            <option>10:00</option>
            <option>10:30</option>
            <option>11:00</option>
            <option>11:30</option>
            <option>12:00</option>
            <option>12:30</option>
            <option>13:00</option>
            <option>13:30</option>
            <option>14:00</option>
            <option>14:30</option>
            <option>15:00</option>
            <option>15:30</option>
            <option>16:00</option>
            <option>16:30</option>
            <option>17:00</option>
            <option>17:30</option>
          </select>
        </div>
        <a href="books.html" class="reserve">Reserve now</a>
      </div>
    </section>
    <script src="seatingbooks.js"></script>
  </body>
</html>
