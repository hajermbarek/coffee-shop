<!doctype html>
<html>
  <head>
    <title>table game reservation</title>
    <link rel="stylesheet" href="seating_games.css">
  </head>
  <body>
    <div class="top">
      <h1>Reserve your seat!</h1>
      <h4> pick a table on the floor plan then choose time and date</h4>
    </div>
    <div class="container">
      <div class="dt">
        <div>
          <label for="table">Selected table:</label>
          <input type="text" id="table" readonly />
        </div>
        <div>
          <label for="date">Date:</label>
          <input type="date" id="date" min="2026-01-01" max="2026-12-31" required />
        </div>
        <div>
          <label for="time">Time:</label>
          <input type="time" id="time" min="08:30" max="23:00" required/>
        </div>
        <button class="reserve_button"> Reserve table </button>
      </div>
      <div class="floor">
        <div class="table4" id="t1">
          <div class="korsi1"></div>
          <div class="korsi2"></div>
          <div class="korsi3"></div>
          <div class="korsi4"></div>
          <div class="number">1</div>
        </div>

        </div>

          <div class="korsi3"></div>
          <div class="korsi4"></div>
          <div class="number">5</div>
        </div>
        <div class="table4" id="t6">
