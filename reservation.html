<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Confirmation de Réservation</title>
    <link rel="stylesheet" href="reservation.css">
</head>
<body>
    <header>
        <h1>Cozy Café</h1>
        <p>Your daily dose of happiness</p>
    </header>

    <form id="finalReservationForm" class="reservation-form">
        <h2>Finalize Your Reservation</h2>

        <!-- Informations personnelles -->
        <label for="firstname">Prénom :</label>
        <input type="text" id="firstname" name="firstname" required>

        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Téléphone :</label>
        <input type="tel" id="phone" name="phone" required>

        <!-- Détails réservation -->
        <label>Date de réservation :</label>
        <input type="text" id="dateDisplay" readonly>

        <label>Heure :</label>
        <input type="text" id="timeDisplay" readonly>

        <label for="people">Nombre de personnes :</label>
        <input type="number" id="people" name="people" min="1" readonly>

        <label>Zone :</label>
        <input type="text" id="zoneDisplay" readonly>

        <label>Activité spécifique :</label>
        <input type="text" id="activityDisplay" readonly>

        <!-- Santé / allergies -->
        <label for="allergies">Allergies alimentaires :</label>
        <textarea id="allergies" name="allergies" placeholder="Ex: Noix, gluten..."></textarea>

        <!-- Commentaires supplémentaires -->
        <label for="comments">Commentaires supplémentaires :</label>
        <textarea id="comments" name="comments" placeholder="Demandes particulières..."></textarea>

        <button type="button" onclick="goBack()">Modifier le choix</button>
        <button type="submit">Confirmer la réservation</button>
    </form>

    <script>
        function goBack() {
            window.history.back();
        }
        document.getElementById('finalReservationForm').addEventListener('submit', function(event){
            event.preventDefault();

            const reservationData = {
                firstname: document.getElementById('firstname').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                date: document.getElementById('dateDisplay').value,
                time: document.getElementById('timeDisplay').value,
                people: document.getElementById('people').value,
                zone: document.getElementById('zoneDisplay').value,
                activity: document.getElementById('activityDisplay').value,
                allergies: document.getElementById('allergies').value,
                comments: document.getElementById('comments').value 
                
            };

            console.log("Réservation confirmée :", reservationData);
            alert("Merci ! Votre réservation est confirmée.");
            window.location.href = "merci.html";
        });
    </script>
</body>
</html>
